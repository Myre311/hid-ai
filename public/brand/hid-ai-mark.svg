

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="HID AI">
  <title>HID AI</title>
  <!-- D triangular outline + compass rose, isolated as the brand mark -->
  <g fill="currentColor">
    <rect x="0" y="0" width="14" height="100"/>
    <line x1="14" y1="0" x2="100" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="square"/>
    <line x1="14" y1="100" x2="100" y2="50" stroke="currentColor" stroke-width="3" stroke-linecap="square"/>
    <g transform="translate(38, 50)">
      <polygon points="0,-22 3,0 -3,0"/>
      <polygon points="0,22 3,0 -3,0"/>
      <polygon points="-12,0 0,-3 0,3"/>
      <polygon points="32,0 0,-3 0,3" fill="#F4B41A"/>
      <circle cx="0" cy="0" r="2.2" fill="currentColor"/>
    </g>
  </g>
</svg>
