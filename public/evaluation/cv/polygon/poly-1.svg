<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Vue aérienne — bâtiment forme L">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0e18"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  
  <!-- Sol / terrain -->
  <rect x="0" y="0" width="800" height="600" fill="#1c1e2a"/>
  <rect x="60" y="60" width="680" height="480" fill="#28293a" opacity="0.5"/>

  <!-- Bâtiment principal (forme L) -->
  <g>
    <path d="M 176 120
             L 496 120
             L 496 300
             L 624 300
             L 624 468
             L 176 468 Z"
          fill="#4a5070" stroke="#fafafa" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Détails toiture -->
    <line x1="176" y1="294" x2="496" y2="294" stroke="#2a2c3a" stroke-width="1"/>
    <line x1="336" y1="120" x2="336" y2="468" stroke="#2a2c3a" stroke-width="1"/>
    <!-- Ombre côté -->
    <rect x="496" y="120" width="6" height="180" fill="rgba(0,0,0,0.4)"/>
    <rect x="176" y="468" width="448.00000000000006" height="4" fill="rgba(0,0,0,0.4)"/>
  </g>

  <!-- Végétation autour pour contexte -->
  <circle cx="96" cy="210" r="22" fill="#2e3a28" opacity="0.7"/>
  <circle cx="704" cy="180" r="18" fill="#2e3a28" opacity="0.7"/>
  <circle cx="96" cy="420" r="20" fill="#2e3a28" opacity="0.7"/>
  <circle cx="704" cy="510" r="22" fill="#2e3a28" opacity="0.7"/>

  <g>
    <rect x="8" y="8" width="200" height="22" rx="3" fill="rgba(0,0,0,0.6)"/>
    <text x="14" y="23" font-family="monospace" font-size="11" fill="#e8e8ef">Vue aérienne — bâtiment forme L</text>
  </g>
</svg>