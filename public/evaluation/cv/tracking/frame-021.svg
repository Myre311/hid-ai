    <text x="14" y="23" font-family="monospace" font-size="11" fill="#e8e8ef">CAM-04 · 21/50</text>
    <rect x="530" y="8" width="102" height="22" rx="3" fill="rgba(200,149,48,0.18)" stroke="#c89530" stroke-width="0.8"/>
